version: 1
name: mcprice
description: >
  Real-time financial intelligence MCP for AI agents — stocks, crypto, options,
  correlations, fundamentals, geopolitical risk, and Revolut availability.
  25 tools. No API keys. Free forever.

  PRICE TOOLS: get_price, get_prices_bulk, get_crypto_price, price_snapshot,
  revolut_price_check, crypto_top_movers, portfolio_pnl, market_overview,
  revolut_watchlist, revolut_sector_scan.

  SIGNAL TOOLS: fear_greed_index, earnings_calendar, technical_signals,
  insider_flow_scan, crypto_funding_rates, price_alert_check.

  INTELLIGENCE TOOLS: financial_news, deepear_signals, prediction_markets,
  news_sentiment_score.

  ANALYTICS TOOLS (v5.0): stock_correlation (co-movement discovery + pair analysis
  + sector clustering + rolling/regime correlation), options_analysis
  (Black-Scholes payoff curves + Greeks for 7 strategies),
  geopolitical_energy_risk (Hormuz Strait Monitor + oil trade signals),
  stock_deep_data (income/balance/cashflow/analysts/insiders/dividends/news),
  options_chain (live IV surface + open interest + max pain + put-call ratio).

  Data sources: yfinance, Binance, alternative.me, DeepEar, Polymarket,
  NewsNow/WallStreetCN, SEC EDGAR, Hormuz Strait Monitor.

runtime: container
entry: app.py

build:
  dockerfile: Dockerfile

startCommand:
  type: http
  command: python app.py
