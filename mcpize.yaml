name: mcprice
description: >
  Real-time stock & crypto prices for AI agents — with instant Revolut availability checks.
  No API keys. Ask Claude: "Is NVDA on Revolut?", "Calculate my portfolio P&L",
  "Give me a morning market overview", or "Scan the defense sector for Revolut picks."
  10 tools. Stocks via yfinance, crypto via Binance.
version: "2.2"
author: gepappas98
repository: https://github.com/gepappas98/revolut-pulse-mcp.v2
transport: streamable-http
port: 8080
entry: app.py

keywords:
  - mcp
  - revolut
  - stock prices
  - crypto prices
  - yfinance
  - binance
  - claude desktop
  - cursor
  - no api key
  - real-time
  - portfolio pnl
  - market overview
  - sector scan

tags:
  - finance
  - stocks
  - crypto
  - revolut
  - mcp-server
  - ai-assistant
  - real-time-prices
  - no-api-key
  - portfolio
  - trading
  - market-overview

tools:
  - name: get_price
    description: Current price + 24h change for one stock or ETF (yfinance, cloud-reliable)

  - name: get_prices_bulk
    description: Fetch live prices for up to 20 tickers at once

  - name: get_crypto_price
    description: Real-time crypto price from Binance — BTC, ETH, SOL and 50+ more

  - name: price_snapshot
    description: Full watchlist snapshot — stocks + crypto combined with market mood indicator

  - name: revolut_price_check
    description: Price + instant check if a stock or ETF is available on Revolut 💳

  - name: crypto_top_movers
    description: Top crypto gainers and losers from Binance 24h — with Revolut availability filter

  - name: portfolio_pnl
    description: Real-time P&L calculator — pass your holdings (ticker, qty, avg_price) and get live profit/loss per asset + portfolio summary with Revolut availability

  - name: market_overview
    description: Full market dashboard — major indices (SPY/QQQ/DIA/IWM), commodities (GLD/SLV/USO/TLT), and top crypto (BTC/ETH/SOL/BNB) with mood indicator. No arguments needed.

  - name: revolut_watchlist
    description: Bulk Revolut availability check + live prices for a mixed stock/crypto watchlist — splits into available vs not available on Revolut

  - name: revolut_sector_scan
    description: Scan an entire sector (tech/defense/crypto/energy/finance/health/etf/ai) — live prices + best Revolut-tradeable pick of the day

seo:
  title: "mcprice: Real-Time Stock & Crypto Prices for Claude & Cursor | Portfolio P&L | Revolut Checker | No API Key"
  description: >
    Get live stock and crypto prices inside Claude or Cursor with mcprice.
    No API keys required. 10 tools: bulk pricing, Revolut availability checker,
    real-time portfolio P&L, full market overview, sector scanner, crypto top movers.
    Free MCP server. Stocks via yfinance, crypto via Binance.
  canonical: https://mcprice.fly.dev
  og_image: https://mcprice.fly.dev/og-image.png
