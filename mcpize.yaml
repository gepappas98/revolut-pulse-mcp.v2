name: mcprice
description: Real-time stock & crypto MCP server for Claude and Cursor. No API keys required.
version: "2.0"
author: gepappas98
repository: https://github.com/gepappas98/revolut-pulse-mcp.v2
transport: streamable-http
port: 8000
entry: app.py

keywords:
  - mcp
  - stock prices
  - crypto prices
  - yahoo finance
  - binance
  - claude desktop
  - cursor
  - no api key
  - real-time

tags:
  - finance
  - stocks
  - crypto
  - mcp-server
  - ai-assistant

tools:
  - name: get_price
    description: Current price + 24h change for one stock or ETF

  - name: get_prices_bulk
    description: Fetch prices for up to 20 tickers at once

  - name: get_crypto_price
    description: Real-time crypto price from Binance (BTC, ETH, SOL...)

  - name: price_snapshot
    description: Full watchlist snapshot — stocks + crypto + market mood

  - name: revolut_price_check
    description: Price + check if the stock is available on Revolut

  - name: crypto_top_movers
    description: Top gainers and losers from Binance 24h

seo:
  title: "mcprice: Real-Time Stock & Crypto MCP Server for Claude & Cursor | No API Key"
  description: "Get live stock and crypto prices inside Claude or Cursor with mcprice. No API keys. 6 powerful tools including bulk pricing, top movers, and Revolut check. Free MCP server."
  canonical: https://mcpize.com/mcp/mcprice
  # og_image: https://mcpize.com/images/mcprice-og.png   # (προαιρετικά, αν υπάρχει εικόνα)
