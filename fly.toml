app            = "mcprice"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  PORT          = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  # Keep 1 machine alive — MCP clients expect <2s response; cold starts take 10-20s.
  min_machines_running = 1

  # FIX 406: probe /health (always 200) instead of /mcp (needs Accept headers)
  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
